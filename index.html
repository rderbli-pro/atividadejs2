<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <title>Cadastro</title>
    <script>
        function pesquisarCep(){
            const cep = document.getElementById("cep").value
            const link = "https://viacep.com.br/ws/" + cep + "/json/?callback=preencherEndereco"
            var script = document.createElement("script")
            script.src = link
            document.body.appendChild(script)
        }
        function preencherEndereco(conteudo){
            alert(JSON.stringify(conteudo))
        }
    </script>
</head>
<body>
    <header> </header>
    <main>
        <h1>Cadastro de clientes</h1>
        <form>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Digite seu nome aqui" required class="input-texto">

            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" placeholder="000.000.000-00" required class="input-texto">

            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="email@email.com" required class="input-texto">

            <label for="celular">Celular:</label>
            <input type="tel" id="celular" placeholder="(42)99999-9999" required class="input-texto">

            <label for="cep">CEP:</label>
            <input type="text" id="cep" onblur="pesquisarCep()" placeholder="00000-000" required class="input-texto">

            <label for="rua">Rua:</label>
            <input type="text" id="rua" placeholder="Nome da rua" required class="input-texto">

            <label for="numero">Número:</label>
            <input type="text" id="numero" placeholder="Nº" required class="input-texto">

            <label for="bairro">Bairro:</label>
            <input type="text" id="bairro" placeholder="Seu bairro" required class="input-texto">

            <label for="cidade">Cidade:</label>
            <input type="text" id="cidade" placeholder="Sua cidade" required class="input-texto">

            <label for="uf">UF:</label>
            <input type="text" id="uf" placeholder="Estado" maxlength="2" required class="input-texto">

            <label for="senha">Senha:</label>
            <input type="password" id="senha" placeholder="Crie uma senha" required class="input-texto">

            <input type="submit" value="Enviar Cadastro" class="btn_enviar">  
        </form>
    </main>
    <footer> </footer>
</body>
</html>
