<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <!DOCTYPE html>
    <script>
        function pesquisarcep(){
            const cep = document.getElementById("cep").value 
            const link = "https://viacep.com.br/ws/" + cep + "/json/?callback=preencherEndereco"
            var script = document.createElement("script")
            script.src = link
            document.body.appendChild(script)
        }
        function preencherEndereco(conteudo){
            if(!("erro" in conteudo)){
                document.getElementById("rua").value = conteudo.logradouro
                document.getElementById("bairro").value = conteudo.bairro
                document.getElementById("cidade").value = conteudo.localidade
                document.getElementById("uf").value = conteudo.estado 
            } else {
                var x = document.getElementById("toast");
                x.className = "toast show";
                x.textContent = "CEP digitado inexistente!"
                setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
            }
            
        }

    </script>
</head>
<body>
    <h1>Cadastro de Clientes</h1>
    <div>
    <form>
        <main class="container">
        <label for="nome">Nome</label>
        <input type="text" id="nome" required placeholder="Digite seu nome aqui">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="digiteseuemail@email">
        <label for="celular">Telefone</label>
        <input type="telefone" id="celular" required placeholder="99999-9999">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" required placeholder="29210115651">
        <label for="cep">CEP</label> 
        <input type="text" id="cep" onblur="pesquisarcep()" required placeholder="12345678">
        <label for="rua">Rua</label>
        <input type="text" id="rua" required placeholder="Digite aqui a rua">
        <label for="numero">Número</label>
        <input type="text" id="numero" required placeholder="Digite aqui o Número">
        <label for="bairro">Bairro</label>
        <input type="text" id="bairro" required placeholder="Digite aqui o Bairro">
        <label for="cidade">Cidade</label>
        <input type="text" id="cidade" required placeholder="Digite aqui a cidade">
        <label for="uf">Estado</label>
        <input type="text" id="uf" required placeholder="Digite aqui o Estado">
        <label for="senha">senha</label>
        <input type="text" id="senha" required placeholder="Digite aqui sua senha">
        <input type="submit" value="Enviar Cadastro">
        <div id="toast" class="toast"></div>
        </main>
    </div>
    </form>
</body>
</html>
